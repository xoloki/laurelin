name: CI

on:
  push:
    branches: [master]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Run Rust unit tests
        run: cargo test --package laurelin-contract --package laurelin-circuit

  integration:
    name: Integration test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      # ── Trusted setup ────────────────────────────────────────────────────
      - name: Run trusted setup (generates pk.bin + contract/src/*_vk_generated.rs)
        run: |
          cargo run --release --package laurelin-circuit --bin laurelin-setup \
            -- --pk-dir /tmp/laurelin-setup --vk-dir contract/src

      # ── Rust / Solana SBF toolchain ─────────────────────────────────────
      - name: Cache Solana install
        id: cache-solana
        uses: actions/cache@v4
        with:
          path: ~/.local/share/solana
          key: solana-v3.1.11

      - name: Install Solana CLI v3.1.11
        if: steps.cache-solana.outputs.cache-hit != 'true'
        run: |
          sh -c "$(curl -sSfL https://release.anza.xyz/v3.1.11/install)"

      - name: Add Solana to PATH
        run: echo "$HOME/.local/share/solana/install/active_release/bin" >> "$GITHUB_PATH"

      - name: Build SBF program
        run: cargo build-sbf --manifest-path contract/Cargo.toml

      # ── Local validator + deploy ─────────────────────────────────────────
      - name: Start solana-test-validator
        run: |
          solana-test-validator --quiet &
          sleep 5

      - name: Generate payer keypair + configure CLI
        run: |
          solana-keygen new --no-bip39-passphrase --outfile /tmp/payer.json
          solana config set --url http://127.0.0.1:8899 --keypair /tmp/payer.json

      - name: Airdrop to payer
        run: solana airdrop 100

      - name: Deploy program and capture program ID
        run: |
          DEPLOY_OUTPUT=$(solana program deploy target/deploy/laurelin.so)
          echo "$DEPLOY_OUTPUT"
          PROGRAM_ID=$(echo "$DEPLOY_OUTPUT" | grep -oP 'Program Id: \K\S+')
          echo "PROGRAM_ID=$PROGRAM_ID" >> "$GITHUB_ENV"

      # ── Integration test: deposit / transfer / withdraw cycle ──────────────
      - name: Run integration test
        run: |
          cargo run --release --package laurelin-wallet --bin integration-test -- \
            "$PROGRAM_ID" /tmp/payer.json /tmp/laurelin-setup
